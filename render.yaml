services:
  - type: web
    name: clouddash-api
    runtime: python
    plan: free
    pythonVersion: "3.13"
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -e .
      python -m clouddash.scripts.ingest_kb
    startCommand: uvicorn clouddash.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend/src
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: sarvam
      - key: GOOGLE_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LLM_REASONING_MODEL
        value: sarvam-105b
      - key: LLM_FAST_MODEL
        value: sarvam-105b
      - key: LLM_JUDGE_MODEL
        value: sarvam-105b
      - key: SARVAM_REASONING_MODEL
        value: sarvam-105b
      - key: SARVAM_FAST_MODEL
        value: sarvam-105b
      - key: SARVAM_REASONING_EFFORT
        value: high
      - key: LLM_TEMPERATURE
        value: "0.0"
      - key: LLM_TIMEOUT_SECONDS
        value: "60"
      - key: LLM_MAX_RETRIES
        value: "3"
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: clouddash-multi-agent
      - key: LANGCHAIN_ENDPOINT
        value: https://api.smith.langchain.com
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma
      - key: RERANKER_TYPE
        value: cohere
      - key: RETRIEVAL_TOP_K_RERANKED
        value: "5"
      - key: GROUNDING_MIN_SCORE
        value: "0.3"
      - key: MAX_INPUT_LENGTH
        value: "4000"
      - key: MOCK_CRM_PATH
        value: /opt/render/project/src/backend/data/mock_customers.json
    disk:
      name: chroma-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: clouddash-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://clouddash-hev5.onrender.com
